name: Deploy Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST || secrets.VPS_HOST }}
          username: ${{ secrets.HOSTINGER_USER || secrets.VPS_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY || secrets.VPS_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT || secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            cd ${{ secrets.HOSTINGER_APP_PATH || secrets.VPS_APP_PATH }}
            git fetch --prune origin
            git reset --hard origin/main
            git clean -fd
            chmod +x scripts/deploy.sh
            DEPLOY_BRANCH=main RUN_FRONTEND_BUILD=0 RUN_MIGRATIONS=1 bash scripts/deploy.sh
